# TODO: We should probably also run the tests before publishing?
name: release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  changelog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Get release notes from changelog
        id: release_notes
        env:
          GITHUB_REF: ${{  github.ref_name }}
        run: |
          export VERSION=$(echo ${GITHUB_REF} | sed 's/^v//')
          awk -v ver=${VERSION} '/^## Version / { if (p) { exit }; if ($3 == ver) { p=1; next } } p && NF' CHANGELOG.md > /tmp/release_notes.md
          echo "path=/tmp/release_notes.md" >> $GITHUB_OUTPUT

      - name: Release Change log
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body_path: ${{ steps.release_notes.outputs.path }}

  release-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: 'true'
      - name: Install Dependencies
        run: |
          sudo apt-get update && \
            sudo apt-get install -y --no-install-recommends curl libssl-dev pkg-config libclang-dev protobuf-compiler libprotobuf-dev libsqlite3-dev zip

      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: PNPM install
        run: |
          pnpm i
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          default: true
      - name: Rust Build
        run: |
          RUSTFLAGS="-C target-feature=+crt-static" cargo build --target x86_64-unknown-linux-gnu --release --bin trail && \
            zip -r -j trailbase_${{  github.ref_name }}_linux_amd64.zip target/x86_64-unknown-linux-gnu/release/trail CHANGELOG.md LICENSE

      - name: Release binaries
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: true
          files: trailbase_${{  github.ref_name }}_linux_amd64.zip

  release-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: 'true'
      - name: Install Dependencies
        run: |
            brew update && brew install pkg-config protobuf sqlite

      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: PNPM install
        run: |
          pnpm i
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: x86_64-apple-darwin
          default: true
      - name: Rust Build
        run: |
          cargo build --release --bin trail && \
            zip -r -j trailbase_${{  github.ref_name }}_darwin_arm64.zip target/release/trail CHANGELOG.md LICENSE

      - name: Release binaries
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: true
          files: trailbase_${{  github.ref_name }}_darwin_arm64.zip
